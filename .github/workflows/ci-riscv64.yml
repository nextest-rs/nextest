# Note: this runner is provided externally, so we minimize its access to
# secrets.
on:
  push:
    branches: [main, auto, canary]
  # No pull_request (this should be safe, but the number of runners is limited
  # so we limit it to pushes only.)

name: CI (riscv64)

permissions:
  contents: read
  # No permissions to secrets.

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  RUSTFLAGS: -D warnings
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and test
    runs-on: [self-hosted, linux, riscv64]
    # This is in its own separate environment.
    environment: riscv64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build all targets
        run: cargo build --all-targets
      - name: Test with locally built nextest
        run: cargo local-nt run --profile ci
